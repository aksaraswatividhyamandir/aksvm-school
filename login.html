<!DOCTYPE html>
<html>
<head>
<title>Student Login</title>
<style>
body{font-family:Arial; background:#f2f2f2; margin:0; padding:20px;}
header{background:#004aad; color:white; padding:15px; text-align:center; font-size:22px;}
input{width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #ccc;}
button{padding:10px 15px; background:#004aad; color:white; border:none; border-radius:5px; cursor:pointer; width:100%;}
</style>
</head>
<body>

<header>Student Login</header>

<input type="email" id="email" placeholder="Email">
<input type="text" id="loginCode" placeholder="Login Code">
<button onclick="login()">Login</button>

<script>
const WEB_APP_URL="https://script.google.com/macros/s/AKfycbwgjilN6THd2i7pg1BcS3eE3jrY5ye3gMQ8u7oXXS9n02r83s9VryOaWluRRUzGORUR/exec";

function login(){
  let email=document.getElementById("email").value;
  let loginCode=document.getElementById("loginCode").value;
  
  fetch(`${WEB_APP_URL}?studentLogin=true&email=${email}&loginCode=${loginCode}`)
  .then(r=>r.json())
  .then(data=>{
    if(data.status=="success"){
      localStorage.setItem("studentEmail", email);
      localStorage.setItem("studentClass", data.class);
      localStorage.setItem("studentLoggedIn", "true");
      window.location.href="student-dashboard.html";
    } else {
      alert("Invalid Email or Login Code");
    }
  });
}
</script>

</body>
</html>
