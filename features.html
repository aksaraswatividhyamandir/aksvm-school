<!DOCTYPE html>
<html>
<head><title>Submit Doubt</title></head>
<body>
<h2>Submit Your Doubt</h2>
<input type="text" id="name" placeholder="Your Name">
<input type="text" id="class" placeholder="Class">
<textarea id="question" placeholder="Write your doubt"></textarea><br>
<button onclick="submitDoubt()">Submit</button>
<script>
const WEB_APP_URL="https://script.google.com/macros/s/AKfycbx55wOKLAEy5KENFAV_lNQweL7Ga2fcmEiMnDoaH1aPqou2V_qOPD-9S4jTSyJZxsOGMA/exec";
function submitDoubt(){
const name=document.getElementById("name").value.trim();
const cls=document.getElementById("class").value.trim();
const question=document.getElementById("question").value.trim();
if(!name||!cls||!question){alert("All fields required!");return;}
fetch(`${WEB_APP_URL}?submitDoubt=true&name=${encodeURIComponent(name)}&class=${encodeURIComponent(cls)}&question=${encodeURIComponent(question)}`)
.then(r=>r.text()).then(res=>{if(res==="success"){alert("Doubt submitted!");document.getElementById("name").value="";document.getElementById("class").value="";document.getElementById("question").value="";}else alert("Error");});
}
</script>
</body>
</html>
