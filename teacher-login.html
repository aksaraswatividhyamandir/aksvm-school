<!DOCTYPE html>
<html>
<head>
<title>Teacher Login</title>
<style>
body{font-family:Arial; background:#f2f2f2; margin:0; padding:20px;}
header{background:#004aad; color:white; padding:15px; text-align:center; font-size:22px;}
input{width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #ccc;}
button{padding:10px 15px; background:#004aad; color:white; border:none; border-radius:5px; cursor:pointer; width:100%;}
</style>
</head>
<body>

<header>Teacher Login</header>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>

<script>
const WEB_APP_URL="https://script.google.com/macros/s/AKfycbwgjilN6THd2i7pg1BcS3eE3jrY5ye3gMQ8u7oXXS9n02r83s9VryOaWluRRUzGORUR/exec";

function login(){
  let email=document.getElementById("email").value;
  let password=document.getElementById("password").value;

  fetch(`${WEB_APP_URL}?teacherLogin=true&email=${email}&password=${password}`)
  .then(r=>r.text())
  .then(data=>{
    if(data=="success"){
      localStorage.setItem("teacherEmail", email);
      localStorage.setItem("teacherLoggedIn", "true");
      window.location.href="teacher-dashboard.html";
    } else {
      alert("Invalid Email or Password");
    }
  });
}
</script>

</body>
</html>
