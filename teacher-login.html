<!DOCTYPE html>
<html>
<head>
<title>Teacher Login</title>
<style>
body{font-family:Arial;background:#f2f2f2;text-align:center;}
.login-box{background:white;padding:20px;margin:100px auto;width:300px;border-radius:8px;box-shadow:0 0 10px gray;}
input,button{width:90%;padding:10px;margin:10px 0;}
button{background:#004aad;color:white;border:none;cursor:pointer;}
</style>
</head>

<body>

<div class="login-box">
<h2>Teacher Login</h2>

<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxfWZP9Hm-l5i9gnNWxKO8oIS7TZZdnk2H51dVHQXnLKCXokRQfRB_GdLiy7DAeqmACzg/exec";

function login(){

let email=document.getElementById("email").value.trim();
let password=document.getElementById("password").value.trim();

if(!email||!password){
alert("Enter Email & Password");
return;
}

fetch(SCRIPT_URL+"?teacherLogin=true&email="+encodeURIComponent(email)+"&password="+encodeURIComponent(password))
.then(r=>r.text())
.then(d=>{
if(d=="success"){
window.location.href="teacher-dashboard.html";
}else{
alert("Invalid Credentials");
}
})
.catch(err=>{
alert("Server Error");
console.log(err);
});

}

</script>

</body>
</html>
