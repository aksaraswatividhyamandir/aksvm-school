<!DOCTYPE html>
<html>
<head>
<title>Teacher Login</title>
</head>

<body>

<h2>Teacher Login</h2>

<input type="text"id="email"placeholder="Email"><br><br>

<input type="password"id="password"placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<script>

const url="https://script.google.com/macros/s/AKfycbxfWZP9Hm-l5i9gnNWxKO8oIS7TZZdnk2H51dVHQXnLKCXokRQfRB_GdLiy7DAeqmACzg/exec";

function login(){

let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

fetch(url+"?teacherLogin=true&email="+email+"&password="+pass)

.then(r=>r.text())

.then(d=>{

if(d=="success"){

alert("Login Success");

window.location="teacher-dashboard.html";

}else{

alert("Invalid credentials");

}

});

}

</script>

</body>
</html>
