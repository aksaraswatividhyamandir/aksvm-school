<!DOCTYPE html>
<html>
<head>
<title>Assignments</title>
<style>
body{font-family:Arial; background:#f2f2f2; margin:0; padding:20px;}
header{background:#004aad; color:white; padding:15px; text-align:center;}
.card{background:white; padding:15px; margin:10px 0; border-radius:6px; box-shadow:0 0 5px gray;}
a{color:#004aad; text-decoration:none; font-weight:bold;}
</style>
</head>
<body>

<header>Assignments</header>
<div id="assignmentList"></div>

<script>
const WEB_APP_URL="https://script.google.com/macros/s/AKfycbwgjilN6THd2i7pg1BcS3eE3jrY5ye3gMQ8u7oXXS9n02r83s9VryOaWluRRUzGORUR/exec";
let email=localStorage.getItem("studentEmail");
let studentClass=localStorage.getItem("studentClass");
if(!email){ alert("Please login first"); window.location.href="login.html"; }

function loadAssignments(){
  fetch(`${WEB_APP_URL}?getAssignments=true&class=${studentClass}`)
  .then(r=>r.json())
  .then(data=>{
    let html="";
    data.forEach(a=>{
      html+=`<div class="card"><b>${a.title}</b><br><a href="${a.link}" target="_blank">Open</a></div>`;
    });
    document.getElementById("assignmentList").innerHTML=html;
  });
}

loadAssignments();
</script>
</body>
</html>
