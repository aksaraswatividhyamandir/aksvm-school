<!DOCTYPE html>
<html>
<head>
<title>Teacher Dashboard</title>
</head>

<body>

<h2>Student Doubts</h2>

<div id="doubts"></div>

<script>

const url="https://script.google.com/macros/s/AKfycbxfWZP9Hm-l5i9gnNWxKO8oIS7TZZdnk2H51dVHQXnLKCXokRQfRB_GdLiy7DAeqmACzg/exec";

load();

function load(){

fetch(url+"?getDoubts=true")

.then(r=>r.json())

.then(data=>{

let html="";

for(let i=0;i<data.length;i++){

html+=data[i].studentName+" : "+data[i].question+"<br>";

html+="<input id='a"+i+"'placeholder='Answer'>";

html+="<button onclick='send("+data[i].id+","+i+")'>Send</button><br><br>";

}

document.getElementById("doubts").innerHTML=html;

});

}

function send(id,i){

let ans=document.getElementById("a"+i).value;

fetch(url+"?answerDoubt=true&id="+id+"&answer="+ans)

.then(r=>r.text())

.then(d=>{

alert("Answer Submitted");

load();

});

}

</script>

</body>
</html>
