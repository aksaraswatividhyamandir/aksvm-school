<!DOCTYPE html>
<html>
<head>
<title>Answer Student Doubts</title>
<style>
body{font-family:Arial; background:#f2f2f2; margin:0; padding:20px;}
header{background:#004aad; color:white; padding:15px; text-align:center;}
.card{background:white; padding:15px; margin:10px 0; border-radius:6px; box-shadow:0 0 5px gray;}
textarea{width:100%; padding:10px; margin-top:10px;}
button.submit{margin-top:10px; padding:10px 15px; background:#004aad; color:white; border:none; border-radius:5px; cursor:pointer;}
</style>
</head>
<body>

<header><h2>Student Doubts</h2></header>
<div id="doubtList"></div>

<script>
const WEB_APP_URL="https://script.google.com/macros/s/AKfycbztC6-sab6RVvDIOP9mMfcEfnX8r-Dim7xhJUg2BF9ZUct5x_xiYTcD0niVk1HOgiD-vQ/exec";

let email=localStorage.getItem("teacherEmail");
if(!email){ alert("Please login first"); window.location.href="teacher-login.html"; }

function loadDoubts(){
  fetch(`${WEB_APP_URL}?getDoubts=true&email=all`)
  .then(r=>r.json())
  .then(data=>{
    let html="";
    data.forEach((d,i)=>{
      html+=`<div class="card">
        <b>${d.name}</b><br>${d.question}<br>
        Answer: ${d.answer || "Pending"}
        <textarea id="answer${i}" placeholder="Type answer"></textarea>
        <button class="submit" onclick="sendAnswer(${i+2})">Submit Answer</button>
      </div>`;
    });
    document.getElementById("doubtList").innerHTML=html;
  });
}

function sendAnswer(row){
  let answer=document.getElementById("answer"+(row-2)).value;
  fetch(`${WEB_APP_URL}?answerDoubt=true&row=${row}&answer=${encodeURIComponent(answer)}`)
  .then(()=>{ alert("Answer Submitted"); loadDoubts(); });
}

loadDoubts();
</script>

</body>
</html>
